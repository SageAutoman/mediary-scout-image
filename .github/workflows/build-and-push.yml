name: Build and Push Image

# Builds the media-track (mediary-scout) Docker image from the `src` submodule
# and pushes multi-platform images to GHCR.
#
# Trigger: push any Git tag. Ordinary branch and submodule-bump pushes do not
# build images.
#
# The actual source lives in the `src/` git submodule (SageAutoman/mediary-scout,
# kept in sync with fancydirty/mediary-scout by sync-upstream.yml). The Docker
# build context is `./src` because that is where the Dockerfile and package
# manifests live.

on:
  push:
    tags: ["*"]

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # needed to push to GHCR (ghcr.io)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # -> ghcr.io/sageautoman/mediary-scout-image

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v7.0.0
        with:
          submodules: true
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      # The repo's workflow-permission policy is set to "write", so GITHUB_TOKEN
      # carries packages:write and — crucially — links the package to THIS repo.
      # (Pushing with the PAT left the package unlinked/orphaned, invisible and
      # unmanageable from the UI. That's why we use GITHUB_TOKEN here.)
      - name: Log in to GHCR
        uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=short
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Resolve submodule commit (GIT_SHA build stamp)
        id: sha
        run: echo "sha=$(git -C src rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ steps.sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
